name: Notify Discord on Push (Pre-build)

on:
  push:
    branches:
      - main

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"⏳ **جاري بدء عملية التحديث...**\nتلقينا تغييرات جديدة، جاري بناء الموقع ومعالجة البيانات الآن.\n👤 بواسطة: ${{ github.actor }}\n📝 التزام: ${{ github.event.head_commit.message }}\"}" \
          $DISCORD_WEBHOOK
